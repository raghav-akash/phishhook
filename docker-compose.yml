version: "3.9"

services:

  postgres:
    image: postgres:17

    container_name: phishhook-postgres

    environment:
      POSTGRES_DB: phishhook
      POSTGRES_USER: phishhook_user
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishhook_user -d phishhook"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .

    container_name: phishhook-backend

  depends_on:
    postgres:
    condition: service_healthy

    environment:
      DATABASE_URL: postgresql://phishhook_user:password@postgres:5432/phishhook

    ports:
      - "8000:8000"

  frontend:
    build: ./frontend

    container_name: phishhook-frontend

    depends_on:
      - backend

    ports:
      - "5173:5173"

volumes:
  postgres_data: